<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="cFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#2b2c33"/>
    </linearGradient>
    <filter id="cGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- black hexagonal crystal cluster (compressed graphite vibe) -->
  <g filter="url(#cGlow)" fill="url(#cFill)" stroke="#6b6b73" stroke-width="0.7">
    <polygon points="24,7 31,11 31,19 24,23 17,19 17,11"/>
    <polygon points="14,18 19,21 19,27 14,30 9,27 9,21" opacity="0.92"/>
    <polygon points="34,18 39,21 39,27 34,30 29,27 29,21" opacity="0.92"/>
    <polygon points="24,23 31,27 31,35 24,39 17,35 17,27" opacity="0.96"/>
    <polygon points="18,26 22,28 22,33 18,35 14,33 14,28" opacity="0.9"/>
  </g>

  <!-- subtle metallic highlights -->
  <path d="M18.5 11.5 L24 8.5 L29.5 11.5" stroke="#cfd0d6" stroke-width="1" opacity="0.18" stroke-linecap="round"/>
  <path d="M17.5 27.5 L24 23.5 L30.5 27.5" stroke="#cfd0d6" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
</svg>