<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="o2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dff7ff"/>
      <stop offset="100%" stop-color="#48CAE4"/>
    </linearGradient>
    <filter id="o2Glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- O2 molecule: two connected bright-blue spheres -->
  <g filter="url(#o2Glow)" fill="url(#o2)" stroke="#1aa6d6" stroke-width="0.7">
    <circle cx="19" cy="24" r="7"/>
    <circle cx="29" cy="24" r="7" opacity="0.96"/>
    <rect x="22" y="22.6" width="4" height="2.8" rx="1.4" fill="#e6fbff" opacity="0.9" stroke="none"/>
  </g>

  <path d="M16 21 C18 18 22 18 24 20" fill="none" stroke="#ffffff" opacity="0.35" stroke-width="1" stroke-linecap="round"/>
</svg>