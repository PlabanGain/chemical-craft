<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="n2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d8ff"/>
      <stop offset="100%" stop-color="#b37dff"/>
    </linearGradient>
    <filter id="n2Glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- N2 molecule: two connected violet spheres -->
  <g filter="url(#n2Glow)" fill="url(#n2)" stroke="#8d55ff" stroke-width="0.7">
    <circle cx="19" cy="24" r="7"/>
    <circle cx="29" cy="24" r="7" opacity="0.96"/>
    <rect x="22" y="22.6" width="4" height="2.8" rx="1.4" fill="#e7c7ff" opacity="0.9" stroke="none"/>
  </g>

  <path d="M16 21 C18 18 22 18 24 20" fill="none" stroke="#ffffff" opacity="0.35" stroke-width="1" stroke-linecap="round"/>
</svg>