<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="iceFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6fbff"/>
      <stop offset="100%" stop-color="#a9f0ff"/>
    </linearGradient>
    <filter id="iceGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="2.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ice cube -->
  <g filter="url(#iceGlow)">
    <path d="M16 14 L30 10 L36 18 L22 22 Z" fill="url(#iceFill)" stroke="#6fdff6" stroke-width="0.7" opacity="0.95"/>
    <path d="M16 14 L22 22 L22 36 L16 28 Z" fill="#dffaff" opacity="0.55" stroke="#6fdff6" stroke-width="0.6"/>
    <path d="M22 22 L36 18 L36 32 L22 36 Z" fill="#b7f0ff" opacity="0.65" stroke="#6fdff6" stroke-width="0.6"/>
    <path d="M16 28 L22 36 L36 32 L30 24 Z" fill="#c8f6ff" opacity="0.45"/>
  </g>

  <!-- water droplet inside -->
  <g filter="url(#iceGlow)">
    <path d="M26 19 C29 24 31 24 31 27 C31 30 29 32 26 32 C23 32 21 30 21 27 C21 24 23 24 26 19 Z"
          fill="#63d1ff" opacity="0.85" stroke="#1aa6d6" stroke-width="0.6"/>
  </g>

  <!-- frosted edge highlight -->
  <path d="M18 15 L29 12" stroke="#ffffff" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
</svg>