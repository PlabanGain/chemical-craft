<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="ingot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f2ff"/>
      <stop offset="100%" stop-color="#9bb7ff"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4b66b5" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="steelGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="2.0" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Three stacked futuristic ingots -->
  <g filter="url(#steelGlow)" stroke="#6e86c6" stroke-width="0.8" fill="url(#ingot)">
    <path d="M12 29 h22 a3 3 0 0 1 3 3 v2 a3 3 0 0 1-3 3 H12 a3 3 0 0 1-3-3 v-2 a3 3 0 0 1 3-3 z" opacity="0.95"/>
    <path d="M14 21 h22 a3 3 0 0 1 3 3 v2 a3 3 0 0 1-3 3 H14 a3 3 0 0 1-3-3 v-2 a3 3 0 0 1 3-3 z" opacity="0.92"/>
    <path d="M16 13 h22 a3 3 0 0 1 3 3 v2 a3 3 0 0 1-3 3 H16 a3 3 0 0 1-3-3 v-2 a3 3 0 0 1 3-3 z" opacity="0.9"/>
  </g>

  <!-- highlight edges -->
  <g filter="url(#steelGlow)" opacity="0.45" fill="none" stroke="url(#edge)" stroke-width="1" stroke-linecap="round">
    <path d="M12.5 30.5 h21"/>
    <path d="M14.5 22.5 h21"/>
    <path d="M16.5 14.5 h21"/>
  </g>
</svg>