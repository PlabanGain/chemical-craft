<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b4b66"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="100%" stop-color="#00bbf9"/>
    </linearGradient>
  </defs>
  
  <!-- Main wrist connector frame -->
  <path d="M 20,10 L 40,10 L 48,25 L 52,45 L 38,45 L 35,52 L 25,52 L 22,45 L 8,45 L 12,25 Z" fill="url(#metal)" stroke="#475569" stroke-width="2"/>
  
  <!-- Mechanical core/motor plate -->
  <rect x="22" y="16" width="16" height="20" rx="3" fill="#0f172a" stroke="#00f5d4" stroke-opacity="0.6" stroke-width="1.5"/>
  
  <!-- Cyber glow stripe -->
  <line x1="30" y1="18" x2="30" y2="34" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Structural bolts/hinges -->
  <circle cx="16" cy="40" r="5" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="16" cy="40" r="2" fill="#00f5d4"/>
  
  <circle cx="44" cy="40" r="5" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="44" cy="40" r="2" fill="#00f5d4"/>
  
  <!-- Top mount pin -->
  <circle cx="30" cy="10" r="4" fill="#64748b"/>
</svg>
